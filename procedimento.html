<nav>

<h1>Catálogo de Procedimentos</h1>

<div class="catalogo">

    <div class="card" onclick="abrir('img/botoox.jpg','Botox','Reduz rugas e linhas de expressão.','500')">
        <img src="img/botoox.jpg">
        <h3>Botox</h3>
    </div>

    <div class="card" onclick="abrir('img/labial.jpg','Preenchimento Labial','Aumenta o volume dos lábios.','800')">
        <img src="img/labial.jpg">
        <h3>Preenchimento Labial</h3>
    </div>

    <div class="card" onclick="abrir('img/micro.jpg','Micropigmentação','Realça os lábios.','600')">
        <img src="img/micro.jpg">
        <h3>Micropigmentação</h3>
    </div>

    <div class="card" onclick="abrir('img/Peeling','Peeling','Renovação da pele, melhora manchas e textura.','300')">
        <img src="img/Peeling">
        <h3>Peeling</h3>
    </div>
    
    <div class="card" onclick="abrir('img/Pfacial.webp','Preenchimento Facial','Preenche rugas e devolve volume ao rosto com ácido hialurônico.','1200')">
        <img src="img/Pfacial.webp">
        <h3>Preenchimento Facial</h3>
    </div>
    
    <div class="card" onclick="abrir('img/Agulhamento.jpg','Microagulhamento','Estimula colágeno e melhora a aparência da pele.','400')">
        <img src="img/Agulhamento.jpg">
        <h3>Microagulhamento</h3>
    </div>

</div>

<!-- TELA DE DETALHE -->
<div id="detalhe" style="display:none;">
    <button onclick="fechar()">Voltar</button>

    <div class="detalhe-box">
        <img id="imgDetalhe">
        <div>
            <h2 id="nomeDetalhe"></h2>
            <p id="descDetalhe"></p>
            <h3 id="precoDetalhe"></h3>
        </div>
    </div>
</div>

<h2 id="info"></h2>


</body>
