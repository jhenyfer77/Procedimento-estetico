<body>

    <nav id="menu">

        <div class="nav-left">
            <img src="img/logo1.jpg" class="logo">

<h1 id="titulo">Catálogo de Procedimentos</h1>

<div id="conteudo">

    <h2>Rosto</h2>
    <div class="catalogo">
    
        <div class="card" onclick="abrir('img/botox.jpg','Botox','Reduz rugas e linhas de expressão.','500')">
            <img src="img/botox.jpg">
            <h3>Botox</h3>
        </div>
    
        <div class="card" onclick="abrir('img/Pfacial.webp','Preenchimento Facial','Devolve volume ao rosto.','1200')">
            <img src="img/Pfacial.webp">
            <h3>Preenchimento Facial</h3>
        </div>
    
    </div>
    
    
    <h2>Lábios</h2>
    <div class="catalogo">
    
        <div class="card" onclick="abrir('img/labial.jpg','Preenchimento Labial','Aumenta o volume dos lábios.','800')">
            <img src="img/labial.jpg">
            <h3>Preenchimento Labial</h3>
        </div>
    
        <div class="card" onclick="abrir('img/micro.jpg','Micropigmentação','Realça sobrancelhas e define traços.','600')">
            <img src="img/micro.jpg">
            <h3>Micropigmentação</h3>
        </div>
    
    </div>
    
    
    <h2>Pele</h2>
    <div class="catalogo">
    
        <div class="card" onclick="abrir('img/Peeling','Peeling','Renova a pele e melhora manchas.','300')">
            <img src="img/Peeling">
            <h3>Peeling</h3>
        </div>
    
        <div class="card" onclick="abrir('img/Agulhamento.jpg','Microagulhamento','Estimula colágeno.','400')">
            <img src="img/Agulhamento.jpg">
            <h3>Microagulhamento</h3>
        </div>
    
    </div>

</div>

<!-- DETALHE -->
<div id="detalhe" style="display:none;">

    <div class="topo-detalhe">
        <button class="btn-voltar" onclick="fechar()">← Voltar</button>
    </div>

    <div class="detalhe-box">
        <img id="imgDetalhe">
        <div>
            <h2 id="nomeDetalhe"></h2>
            <p id="descDetalhe"></p>
            <h3 id="precoDetalhe"></h3>
        </div>
    </div>

</div>
